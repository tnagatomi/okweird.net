<!DOCTYPE html>
<html lang="{{ .Lang }}">
  <head>
    {{- partial "head.html" . -}}
  </head>
  <body>
    <a href="#main-content" class="skip-link">{{ if eq .Lang "ja" }}メインコンテンツへスキップ{{ else }}Skip to main content{{ end }}</a>
    {{- partial "header.html" . -}}

    <main id="main-content">
      {{- block "main" . }}{{- end }}
    </main>

    {{- partial "footer.html" . -}}
  </body>
</html>
