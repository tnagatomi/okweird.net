{{ define "main" }}
<h1>Blog</h1>
<ul aria-label="{{ if eq .Lang "ja" }}ブログ記事一覧{{ else }}Blog posts{{ end }}">
  {{- range .Pages.ByDate.Reverse }}
  <li>
    <a href="{{ .Permalink }}">
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "2006-01-02" }}</time>
      {{ .Title }}
    </a>
  </li>
  {{- end }}
</ul>
{{ end }}
